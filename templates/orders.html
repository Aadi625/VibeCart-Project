<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>Order History</h1>

        <a href="/products">Products</a> |
        <a href="/cart">Cart</a> |
        <a href="/logout">Logout</a>

        <hr>
        {% if orders %}
        <table>

            <tr>
                <th>Order ID</th>
                <th>Total Amount (₹)</th>
                <th>Status</th>
                <th>Order Date</th>
            </tr>

            {% for order in orders %}

            <tr>
                <td>{{ order.order_id }}</td>
                <td>{{ order.total_amount }}</td>
                <td>{{ order.status }}</td>
                <td>{{ order.order_date }}</td>
            </tr>
            {% endfor %}

        </table>

        {% else %}
        <h3>No Orders Found</h3>

        <a href="/products">
            Start Shopping
        </a>

        {% endif %}

    </div>

</body>
</html>
